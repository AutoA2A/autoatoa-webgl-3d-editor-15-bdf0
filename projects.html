<section style='margin-bottom:var(--gap);'><h2 style='margin-top:0;color:var(--primary);font-size:1.5rem;'>我的项目</h2><div id="projects-list"></div></section>
<script>
document.addEventListener('DOMContentLoaded',function(){
 var container=document.getElementById('projects-list');
 container.innerHTML='';
 var models=[];
 for(var i=0;i<localStorage.length;i++){
   var key=localStorage.key(i);
   if(key.indexOf('model_')===0){
     var name=key.substring(6);
     models.push({name:name,data:localStorage.getItem(key)});
   }
 }
 if(models.length===0){
   container.innerHTML="<div style='text-align:center;padding:var(--gap) 0;color:var(--muted);'><svg width='48' height='48' viewBox='0 0 24 24' fill='none' stroke='var(--muted)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'></circle><line x1='12' y1='8' x2='12' y2='12'></line><line x1='12' y1='16' x2='12' y2='16'></line></svg><p style='margin-top:12px;'>暂无项目</p></div>";
   return;
 }
 var ul=document.createElement('ul');
 ul.style.listStyle='none';
 ul.style.padding=0;
 ul.style.margin=0;
 models.forEach(function(m){
   var li=document.createElement('li');
   li.style.padding='8px 0';
   li.style.borderBottom='1px solid var(--border)';
   var span=document.createElement('span');
   span.textContent=m.name;
   var btn=document.createElement('button');
   btn.style.background=var(--primary);
   btn.style.color='#fff';
   btn.style.border='none';
   btn.style.borderRadius=var(--btn-radius);
   btn.style.padding='4px 8px';
   btn.style.fontSize='0.9rem';
   btn.style.cursor='pointer';
   btn.textContent='打开';
   btn.onclick=function(){
     localStorage.setItem('openedModel',m.data);
     window.location.href='editor.html';
   };
   li.appendChild(span);
   li.appendChild(btn);
   ul.appendChild(li);
 });
 container.appendChild(ul);
});
</script>
